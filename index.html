<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard · En Vivo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070A0F;
    --panel: #0E1318;
    --panel2: #131920;
    --border: #1A2230;
    --borderHi: #263040;
    --green: #00D49A;
    --red: #FF4C5E;
    --yellow: #FFB547;
    --blue: #4BA3E3;
    --muted: #3A4A5C;
    --text: #DCE8F5;
    --textSub: #5A7A9A;
    --dani: #4BA3E3;
    --sergio: #00D49A;
    --ds: #FF4C5E;
  }
  :root.light {
    --bg: #F5F7FA;
    --panel: #FFFFFF;
    --panel2: #EEF1F5;
    --border: #DDE3EC;
    --borderHi: #C8D0DC;
    --green: #00A87A;
    --red: #E03348;
    --yellow: #D4920A;
    --blue: #2A7CC7;
    --muted: #A0AEBB;
    --text: #1A2433;
    --textSub: #6B7E95;
    --dani: #2A7CC7;
    --sergio: #00A87A;
    --ds: #E03348;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* SETUP */
  .setup-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .setup-box { max-width: 580px; width: 100%; }
  .setup-tag { font-size: 10px; color: var(--blue); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
  .setup-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
  .setup-sub { font-size: 13px; color: var(--textSub); line-height: 1.7; margin-bottom: 28px; }
  .step-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; }
  .step-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .step-num { background: rgba(75,163,227,0.15); color: var(--blue); border-radius: 6px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .step-t { font-size: 13px; font-weight: 600; }
  .step-list { padding-left: 34px; display: flex; flex-direction: column; gap: 5px; }
  .step-list p { font-size: 12px; color: var(--textSub); display: flex; gap: 8px; }
  .url-row { display: flex; gap: 8px; margin-top: 24px; }
  .url-row input { flex: 1; background: var(--panel); border: 1px solid var(--borderHi); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--text); font-family: 'Inter', 'DM Sans', sans-serif; font-variant-numeric: tabular-nums; outline: none; }
  .url-row input:focus { border-color: var(--blue); }
  .url-row button { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
  .url-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  .hint-box { background: rgba(0,212,154,0.08); border: 1px solid rgba(0,212,154,0.2); border-radius: 8px; padding: 11px 14px; margin-top: 12px; font-size: 11px; color: var(--green); line-height: 1.6; }
  .err { font-size: 12px; color: var(--red); margin-top: 8px; }

  /* DASHBOARD */
  .dash { padding: 0 0 60px; display: none; }
  .topbar { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
  .topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .topbar p { font-size: 11px; color: var(--textSub); margin-top: 3px; }
  .top-btns { display: flex; gap: 8px; }
  .top-btns button { background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .top-btns button:hover { background: var(--panel2); }
  .theme-btn { min-width: 36px; font-size: 15px !important; padding: 7px 10px !important; }
  .content { padding: 0 32px; }

  /* KPIs */
  .kpis { display: grid; grid-template-columns: repeat(6,1fr); gap: 9px; margin: 22px 0; }
  .kpi { background: var(--panel); border-radius: 10px; padding: 14px 16px; }
  .kpi-l { font-size: 10px; color: var(--textSub); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
  .kpi-v { font-size: 24px; font-weight: 500; font-family: 'Inter', 'DM Sans', sans-serif; font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -0.02em; }
  .kpi-s { font-size: 11px; color: var(--textSub); margin-top: 5px; }

  /* SECTION TITLE */
  .sec { display: flex; align-items: center; gap: 10px; margin: 28px 0 14px; }
  .sec-n { background: rgba(75,163,227,0.15); color: var(--blue); border-radius: 5px; padding: 2px 9px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; }
  .sec-t { font-size: 15px; font-weight: 600; }
  .sec-l { flex: 1; height: 1px; background: var(--border); }

  /* CARDS */
  .cards3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .card-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-t { font-size: 15px; font-weight: 700; }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 4px; letter-spacing: 0.04em; }
  .kv { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .kv-l { font-size: 11px; color: var(--textSub); }
  .kv-v { font-size: 13px; font-weight: 500; font-family: 'Inter', 'DM Sans', sans-serif; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

  /* PANEL */
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
  .panel-h { padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; }
  .panel-body { padding: 14px 18px; }

  /* TABLE */
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th { padding: 9px 14px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--textSub); font-weight: 600; background: var(--bg); }
  .tbl th.r, .tbl td.r { text-align: center; }
  .tbl td { padding: 9px 14px; border-top: 1px solid var(--border); }
  .tbl tr:hover td { background: rgba(255,255,255,0.02); }

  /* HEATMAP */
  .heatrow { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .heat-wrap { flex: 1; height: 28px; background: var(--border); border-radius: 5px; overflow: hidden; position: relative; }
  .heat-bar { height: 100%; border-radius: 5px; }
  .heat-lbl { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--text); font-weight: 600; }

  /* SEQUENCE */
  .seq { display: flex; flex-wrap: wrap; gap: 5px; padding: 14px 18px; }
  .sq { width: 28px; height: 28px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; cursor: default; }

  /* GRID 2 */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }

  /* OPEN */
  .open-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 12px; background: var(--panel2); }

  /* FOOTER */
  .footer { margin-top: 28px; padding: 14px 0; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
  .footer span { font-size: 10px; color: var(--muted); }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 12px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Modal de configuración (oculto por defecto) -->
<!-- PASSWORD SCREEN -->
<div id="passwordScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="text-align:center;max-width:320px;width:90%">
    <p style="font-size:10px;color:var(--blue);letter-spacing:0.14em;text-transform:uppercase;font-weight:700;margin:0 0 10px">Trading Dashboard</p>
    <h1 style="font-size:24px;font-weight:700;color:var(--text);margin:0 0 8px;letter-spacing:-0.02em">Acceso Privado</h1>
    <p style="font-size:13px;color:var(--textSub);margin:0 0 28px">Introduce la contraseña para continuar</p>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="pwInput" type="password" placeholder="Contraseña"
        style="flex:1;background:var(--panel);border:1px solid var(--borderHi);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;text-align:center"
        onkeydown="if(event.key==='Enter')checkPw()" />
    </div>
    <button onclick="checkPw()"
      style="width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">
      Entrar
    </button>
    <p id="pwErr" style="font-size:12px;color:var(--red);margin:10px 0 0;min-height:18px"></p>
  </div>
</div>

<div id="setup"  style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center">
  <div style="background:var(--panel);border:1px solid var(--borderHi);border-radius:14px;padding:28px 32px;max-width:480px;width:90%;position:relative">
    <button onclick="closeSetup()" style="position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--textSub);font-size:18px;cursor:pointer;line-height:1">✕</button>
    <p style="font-size:10px;color:var(--blue);letter-spacing:0.12em;text-transform:uppercase;font-weight:600;margin:0 0 8px">Configuración</p>
    <h2 style="font-size:18px;font-weight:600;color:var(--text);margin:0 0 6px">Fuente de datos</h2>
    <p style="font-size:13px;color:var(--textSub);margin:0 0 20px;line-height:1.6">Actualiza la conexión con tu fuente de datos.</p>
    <div style="display:flex;gap:8px">
      <input id="csvUrl" type="text" placeholder="URL de la fuente de datos..."
        style="flex:1;background:var(--panel2);border:1px solid var(--borderHi);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--text);font-family:'DM Mono',monospace;outline:none" />
      <button id="btnConnect" onclick="connect()"
        style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap">
        Guardar
      </button>
    </div>
    <div id="errMsg" class="err" style="margin-top:8px"></div>
  </div>
</div>

<div id="loading" class="loading" style="display:none">
  <div class="spinner"></div>
  <p style="font-size:13px;color:var(--textSub)">Cargando datos...</p>
</div>

<div id="dash" class="dash">
  <div class="topbar">
    <div>
      <h1>Trading Performance · En Vivo</h1>
      <p id="topSub"></p>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div style="display:flex;gap:4px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:3px">
        <button id="filter-all" onclick="setFilter('all')"
          style="background:var(--blue);color:#fff;border:none;border-radius:5px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s">
          Todos
        </button>
        <button id="filter-Dani" onclick="setFilter('Dani')"
          style="background:transparent;color:var(--textSub);border:none;border-radius:5px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s">
          Dani
        </button>
        <button id="filter-Sergio" onclick="setFilter('Sergio')"
          style="background:transparent;color:var(--textSub);border:none;border-radius:5px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s">
          Sergio
        </button>
        <button id="filter-D&S" onclick="setFilter('D&S')"
          style="background:transparent;color:var(--textSub);border:none;border-radius:5px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s">
          D&S
        </button>
      </div>
      <div class="top-btns">
        <button onclick="refresh()">⟳ Actualizar</button>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
        <button onclick="showSetup()" title="Configuración">⚙</button>
      </div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const CSV_KEY = 'trading_csv_url';
const DEFAULT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqa19Bu4VYmAu8tHHdraBMb9EVCl4Ok5bZtD5ITV-8FvmbIfywrOlAa5roS-hPQlKOrzbkULoIdoOC/pub?gid=2004246704&single=true&output=csv';
let currentUrl = localStorage.getItem(CSV_KEY) || DEFAULT_URL;
let activeCharts = [];
let currentFilter = 'all';
let currentRawData = null;

// ─── PARSE & COMPUTE ───────────────────────────────
function parseDate(raw) {
  if (!raw || raw.trim() === '') return null;
  const s = raw.trim();
  // DD/MM/YYYY or D/M/YYYY or D/MM/YYYY
  const r1 = s.match(/^(\d{1,2})[/\-](\d{1,2})[/\-](\d{4})$/);
  if (r1) return new Date(+r1[3], +r1[2]-1, +r1[1]);
  // YYYY-MM-DD ISO
  const r3 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (r3) return new Date(+r3[1], +r3[2]-1, +r3[3]);
  // DD/MM/YY short year
  const r4 = s.match(/^(\d{1,2})[/\-](\d{1,2})[/\-](\d{2})$/);
  if (r4) return new Date(2000 + +r4[3], +r4[2]-1, +r4[1]);
  // "13 de mayo de 2026"
  const months = {enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,octubre:9,noviembre:10,diciembre:11};
  const r2 = s.toLowerCase().match(/(\d+)\s+de\s+(\w+)\s+de\s+(\d{4})/);
  if (r2) return new Date(+r2[3], months[r2[2]] ?? 0, +r2[1]);
  // Try native Date as last resort
  const native = new Date(s);
  if (!isNaN(native)) return native;
  return null;
}

function filterData(data, filter) {
  if (filter === 'all') return data;
  return data.filter(r => {
    const op = (r['Operador'] || r['operador'] || '').trim();
    if (filter === 'Dani') return op === 'Dani' || op === 'D&S';
    if (filter === 'Sergio') return op === 'Sergio' || op === 'D&S';
    if (filter === 'D&S') return op === 'D&S';
    return op === filter;
  });
}

function setFilter(filter) {
  currentFilter = filter;
  // Update button styles
  ['all','Dani','Sergio','D&S'].forEach(f => {
    const btn = document.querySelector('[id="filter-' + f + '"]');
    if (btn) {
      if (f === filter) {
        btn.style.background = 'var(--blue)';
        btn.style.color = '#fff';
        btn.style.borderColor = 'var(--blue)';
      } else {
        btn.style.background = 'var(--panel)';
        btn.style.color = 'var(--textSub)';
        btn.style.borderColor = 'var(--border)';
      }
    }
  });
  if (currentRawData) renderDash(compute(filterData(currentRawData, filter)));
}

function compute(rows) {
  const allRows = rows.map(r => { const n = {}; Object.keys(r).forEach(k => { n[k.trim()] = r[k]; }); return n; }).filter(r => r['N·'] || r['N']);
  // Deduplicar por N· — la última fila (más abajo en el Sheet) es la más actualizada
  const seen = new Map();
  allRows.forEach(r => { const key = String(r['N·'] || r['N']).trim(); seen.set(key, r); });
  // Ordenar por N· numérico para garantizar orden consistente
  const data = Array.from(seen.values()).sort((a, b) => {
    const na = parseFloat(a['N·'] || a['N']) || 0;
    const nb = parseFloat(b['N·'] || b['N']) || 0;
    return na - nb;
  });
  const closed = data.filter(r => r.Resultado === 'Take Profit' || r.Resultado === 'Stop Loss');
  const isTP = r => r.Resultado === 'Take Profit';
  const isSL = r => r.Resultado === 'Stop Loss';
  const rr = r => { const v = parseFloat(r['RR Final']); return isNaN(v) ? 0 : v; };
  const risk = r => { const v = parseFloat(String(r.Riesgo || '1.5').replace('%', '')); return isNaN(v) ? 1.5 : v; };
  const pnl = r => rr(r) * risk(r);
  const sorted = [...closed].sort((a, b) => (parseDate(a.Fecha) || 0) - (parseDate(b.Fecha) || 0));

  const tp = closed.filter(isTP).length, sl = closed.filter(isSL).length;
  const wr = closed.length ? tp / closed.length * 100 : 0;
  const grossW = closed.filter(r => pnl(r) > 0).reduce((s, r) => s + pnl(r), 0);
  const grossL = Math.abs(closed.filter(r => pnl(r) < 0).reduce((s, r) => s + pnl(r), 0));
  const pf = grossL > 0 ? grossW / grossL : grossW > 0 ? Infinity : 0;
  const netPnl = closed.reduce((s, r) => s + pnl(r), 0);

  let eq = 100, peak = 100, maxDD = 0, maxDDPeak = 100, maxDDValley = 100;
  let euroAcc = 100000; // €100k simulation
  const equity = sorted.map(r => {
    eq += pnl(r); if (eq > peak) peak = eq;
    const dd = (peak - eq) / peak * 100; if (dd > maxDD) { maxDD = dd; maxDDPeak = peak; maxDDValley = eq; }
    const pnlPct = pnl(r) / 100;
    euroAcc = +(euroAcc * (1 + pnlPct)).toFixed(2);
    return { n: `N·${r['N·'] || r['N']}`, eq: +eq.toFixed(2), dd: +dd.toFixed(2), op: r.Operador, res: rr(r) > 0 ? 'TP' : rr(r) < 0 ? 'SL' : 'BE', pnlV: +pnl(r).toFixed(2), euroVal: euroAcc };
  });

  // Sharpe y Sortino sobre retornos MENSUALES anualizados (×√12)
  // Más correcto que por operación individual
  const monthlyPnlMap = {};
  closed.forEach(r => {
    const d = parseDate(r.Fecha); if (!d) return;
    const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    monthlyPnlMap[k] = (monthlyPnlMap[k] || 0) + pnl(r);
  });
  const monthlyReturns = Object.values(monthlyPnlMap);
  const nM = monthlyReturns.length || 1;
  const meanR = monthlyReturns.reduce((a,b) => a+b, 0) / nM;
  const stdR = Math.sqrt(monthlyReturns.reduce((s,r) => s+(r-meanR)**2, 0) / nM) || 1;
  const negR = monthlyReturns.filter(r => r < 0);
  const downStd = negR.length ? Math.sqrt(negR.reduce((s,r) => s+r**2, 0) / negR.length) : stdR;
  // Anualizados ×√12
  const sharpeRaw = (meanR / stdR) * Math.sqrt(12);
  const sortinoRaw = (meanR / downStd) * Math.sqrt(12);

  let cw = 0, cl = 0, maxW = 0, maxL = 0;
  sorted.forEach(r => { if (rr(r) > 0) { cw++; cl = 0; } else if (rr(r) < 0) { cl++; cw = 0; } else { cw = 0; cl = 0; } maxW = Math.max(maxW, cw); maxL = Math.max(maxL, cl); });

  const allOps = [...new Set(data.map(r => r.Operador).filter(Boolean))];
  const ops = {};
  allOps.forEach(op => {
    const sub = closed.filter(r => r.Operador === op);
    const tp2 = sub.filter(isTP).length, sl2 = sub.filter(isSL).length;
    const gw = sub.filter(r => pnl(r) > 0).reduce((s, r) => s + pnl(r), 0);
    const gl = Math.abs(sub.filter(r => pnl(r) < 0).reduce((s, r) => s + pnl(r), 0));
    ops[op] = { ops: sub.length, tp: tp2, sl: sl2, wr: sub.length ? tp2 / sub.length * 100 : 0, pf: gl > 0 ? gw / gl : gw > 0 ? Infinity : 0, netPnl: sub.reduce((s, r) => s + pnl(r), 0) };
  });

  const tipos = {};
  closed.forEach(r => {
    const t = r.Tipo || 'Sin tipo';
    if (!tipos[t]) tipos[t] = { tp: 0, sl: 0, ops: 0, grossW: 0, grossL: 0, netPnl: 0 };
    tipos[t].ops++; if (isTP(r)) { tipos[t].tp++; if (pnl(r) > 0) tipos[t].grossW += pnl(r); }
    if (isSL(r)) { tipos[t].sl++; tipos[t].grossL += Math.abs(pnl(r)); } tipos[t].netPnl += pnl(r);
  });

  const monthly = {};
  closed.forEach(r => {
    const d = parseDate(r.Fecha); if (!d) return;
    const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const lbl = d.toLocaleString('es-ES', { month: 'short', year: 'numeric' });
    if (!monthly[k]) monthly[k] = { key: k, label: lbl, ops: {} };
    const op = r.Operador || '?';
    if (!monthly[k].ops[op]) monthly[k].ops[op] = { tp: 0, sl: 0, pnl: 0 };
    if (isTP(r)) monthly[k].ops[op].tp++; if (isSL(r)) monthly[k].ops[op].sl++;
    monthly[k].ops[op].pnl += pnl(r);
  });

  const days = {};
  closed.forEach(r => {
    const d = (r['Día Entrada'] || r['Dia Entrada'] || '').trim(); if (!d) return;
    if (!days[d]) days[d] = { dia: d, ops: 0, tp: 0, sl: 0, pnl: 0 };
    days[d].ops++; if (isTP(r)) days[d].tp++; if (isSL(r)) days[d].sl++; days[d].pnl += pnl(r);
  });

  const dayNum = { 'Domingo': -1, 'Lunes': 0, 'Martes': 1, 'Miercoles': 2, 'Jueves': 3, 'Viernes': 4, 'Semana Siguiente': 7 };
  const withDur = closed.map(r => {
    const e = dayNum[(r['Día Entrada'] || r['Dia Entrada'] || '').trim()];
    const s = dayNum[(r['Día Salida'] || r['Dia Salida'] || '').trim()];
    if (e === undefined || s === undefined) return { ...r, dur: null };
    let diff = s - e; if (diff < 0) diff += 7; return { ...r, dur: diff };
  });
  const tpDur = withDur.filter(r => isTP(r) && r.dur !== null).map(r => r.dur);
  const slDur = withDur.filter(r => isSL(r) && r.dur !== null).map(r => r.dur);
  const avgDur = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
  const open = data.filter(r => !r.Resultado || (r.Resultado !== 'Take Profit' && r.Resultado !== 'Stop Loss'));

  // Equity curves per operator
  const opEquity = {};
  allOps.forEach(op => {
    let opEq = 100, opPeak = 100, opMaxDD = 0;
    const opSorted = sorted.filter(r => r.Operador === op);
    opEquity[op] = opSorted.map(r => {
      opEq += pnl(r); if (opEq > opPeak) opPeak = opEq;
      const dd = (opPeak - opEq) / opPeak * 100; if (dd > opMaxDD) opMaxDD = dd;
      return { n: `N·${r['N·']||r['N']}`, eq: +opEq.toFixed(2), res: rr(r)>0?'TP':rr(r)<0?'SL':'BE', pnlV: +pnl(r).toFixed(2) };
    });
  });

  // Monthly PnL for bar chart
  const monthlyBar = m => {
    const result = {};
    allOps.forEach(op => { result[op] = []; });
    const allMonths = Object.values(monthly).sort((a,b)=>a.key<b.key?-1:1).map(m=>m.label);
    allMonths.forEach(lbl => {
      const row = Object.values(monthly).find(m=>m.label===lbl);
      allOps.forEach(op => {
        result[op].push(row?.ops[op]?.pnl || 0);
      });
    });
    return { labels: allMonths, series: result };
  };
  const monthlyBarData = monthlyBar();
  

  // Edad de la cuenta (primer trade → hoy)
  const allDates = data.map(r => parseDate(r.Fecha)).filter(Boolean);
  const firstDate = allDates.length ? new Date(Math.min(...allDates)) : null;
  const lastDate = allDates.length ? new Date(Math.max(...allDates)) : null;
  const today = new Date();
  const accountAgeDays = firstDate ? Math.floor((today - firstDate) / 86400000) : 0;
  const accountAgeMonths = firstDate ? ((today.getFullYear() - firstDate.getFullYear()) * 12 + (today.getMonth() - firstDate.getMonth())) : 0;
  const accountAgeLabel = accountAgeDays > 0 ? (accountAgeDays < 30 ? accountAgeDays+' días' : accountAgeMonths < 12 ? accountAgeMonths+' meses' : Math.floor(accountAgeMonths/12)+'a '+(accountAgeMonths%12)+'m') : '—';

  // Rentabilidad anualizada real (CAGR)
  const yearsElapsed = accountAgeDays > 0 ? accountAgeDays / 365.25 : 1;
  const cagr = yearsElapsed > 0 ? (Math.pow(euroAcc / 100000, 1 / yearsElapsed) - 1) * 100 : 0;

  // % Meses positivos
  const monthlyPnls = Object.values(monthly).map(m => {
    return Object.values(m.ops).reduce((s, o) => s + (o.pnl||0), 0);
  });
  const posMonths = monthlyPnls.filter(p => p > 0).length;
  const pctPosMonths = monthlyPnls.length > 0 ? posMonths / monthlyPnls.length * 100 : 0;
  const avgMonthlyPnl = monthlyPnls.length > 0 ? monthlyPnls.reduce((a,b)=>a+b,0)/monthlyPnls.length : 0;

  // Mejor y peor mes
  const monthlyLabels = Object.values(monthly).sort((a,b)=>a.key<b.key?-1:1);
  const monthlyPnlMap2 = monthlyLabels.map(m => ({
    label: m.label,
    pnl: Object.values(m.ops).reduce((s,o)=>s+(o.pnl||0),0)
  }));
  const bestMonth = monthlyPnlMap2.reduce((b,m) => m.pnl > b.pnl ? m : b, monthlyPnlMap2[0]||{label:'—',pnl:0});
  const worstMonth = monthlyPnlMap2.reduce((w,m) => m.pnl < w.pnl ? m : w, monthlyPnlMap2[0]||{label:'—',pnl:0});

  // Frecuencia de operaciones por semana
  const weekMap = {};
  closed.forEach(r => {
    const d = parseDate(r.Fecha); if (!d) return;
    const yr = d.getFullYear();
    const wk = Math.ceil((((d - new Date(yr,0,1))/86400000) + new Date(yr,0,1).getDay()+1)/7);
    const key = yr+'-W'+String(wk).padStart(2,'0');
    if (!weekMap[key]) weekMap[key] = { key, label: key, ops: 0, tp: 0, sl: 0 };
    weekMap[key].ops++;
    if (isTP(r)) weekMap[key].tp++;
    if (isSL(r)) weekMap[key].sl++;
  });
  const weeklyFreq = Object.values(weekMap).sort((a,b)=>a.key<b.key?-1:1);
  const avgOpsPerWeek = weeklyFreq.length > 0 ? weeklyFreq.reduce((s,w)=>s+w.ops,0)/weeklyFreq.length : 0;

  // ── NEW METRICS ──
  // Avg Win / Avg Loss / Payoff Ratio
  const winPnls = sorted.filter(r => pnl(r) > 0).map(r => pnl(r));
  const lossPnls = sorted.filter(r => pnl(r) < 0).map(r => Math.abs(pnl(r)));
  const avgWin = winPnls.length ? winPnls.reduce((a,b)=>a+b,0)/winPnls.length : 0;
  const avgLoss = lossPnls.length ? lossPnls.reduce((a,b)=>a+b,0)/lossPnls.length : 0;
  const payoffRatio = avgLoss > 0 ? avgWin / avgLoss : 0;

  // Best / Worst trade
  const bestTrade = sorted.reduce((best, r) => pnl(r) > pnl(best) ? r : best, sorted[0] || {});
  const worstTrade = sorted.reduce((worst, r) => pnl(r) < pnl(worst) ? r : worst, sorted[0] || {});

  // Recovery Factor = NetPnL / MaxDD
  const recoveryFactor = maxDD > 0 ? netPnl / maxDD : 0;

  // Calmar Ratio = annualized return / MaxDD
  const periodsInYear = nM > 0 ? 12 / nM : 1;
  const annualizedReturn = netPnl * periodsInYear;
  const calmarRatio = maxDD > 0 ? annualizedReturn / maxDD : 0;

  // % time in drawdown
  const inDD = equity.filter(e => e.dd > 0).length;
  const pctTimeInDD = equity.length > 0 ? (inDD / equity.length * 100) : 0;

  // Rolling Win Rate (last 10 closed trades)
  const last10 = sorted.slice(-10);
  const rolling10Tp = last10.filter(r => pnl(r) > 0).length;
  const rolling10Wr = last10.length > 0 ? rolling10Tp / last10.length * 100 : 0;
  const rollingHistory = sorted.map((_, i) => {
    const window = sorted.slice(Math.max(0, i-9), i+1);
    const wTp = window.filter(r => pnl(r) > 0).length;
    return { i: i+1, wr: wTp / window.length * 100, n: `N·${sorted[i]['N·']||sorted[i]['N']}` };
  });

  // Analysis by pair
  const pairStats = {};
  closed.forEach(r => {
    const par = r.PAR || '?';
    if (!pairStats[par]) pairStats[par] = { par, ops:0, tp:0, sl:0, grossW:0, grossL:0, netPnl:0 };
    pairStats[par].ops++;
    if (isTP(r)) { pairStats[par].tp++; pairStats[par].grossW += pnl(r); }
    if (isSL(r)) { pairStats[par].sl++; pairStats[par].grossL += Math.abs(pnl(r)); }
    pairStats[par].netPnl += pnl(r);
  });
  const pairArray = Object.values(pairStats).map(p => ({
    ...p,
    wr: p.ops > 0 ? p.tp/p.ops*100 : 0,
    pf: p.grossL > 0 ? p.grossW/p.grossL : p.grossW > 0 ? Infinity : 0
  })).sort((a,b) => b.wr - a.wr);

  // Monthly bar data aware of filter (merge D&S into operator when filtered)
  const monthlyBarDataFiltered = (filt) => {
    const labels = Object.values(monthly).sort((a,b)=>a.key<b.key?-1:1).map(m=>m.label);
    if (filt === 'all') return monthlyBarData;
    // When filtered by Dani or Sergio, merge D&S into their data
    const mergedOps = {};
    labels.forEach((lbl, li) => {
      const row = Object.values(monthly).find(m=>m.label===lbl);
      const base = row?.ops[filt]?.pnl || 0;
      const ds = row?.ops['D&S']?.pnl || 0;
      mergedOps[lbl] = base + ds;
    });
    return { labels, series: { [filt]: labels.map(l => mergedOps[l] || 0) } };
  };

  return { total: data.length, closed: closed.length, open: open.length, tp, sl, wr, pf, netPnl, maxDD, sharpe: isFinite(sharpeRaw) ? sharpeRaw : 0, sortino: isFinite(sortinoRaw) ? sortinoRaw : 0, nMonths: nM, maxDDPeak: +maxDDPeak.toFixed(2), maxDDValley: +maxDDValley.toFixed(2), maxW, maxL, equity, tipos, ops, monthly: Object.values(monthly).sort((a, b) => a.key < b.key ? -1 : 1), days: Object.values(days), allOps, openTrades: open, tpDurAvg: avgDur(tpDur), slDurAvg: avgDur(slDur), finalEuroAcc: euroAcc, opEquity, monthlyBarData, pctPosMonths, posMonths, bestMonth, worstMonth, avgMonthlyPnl, accountAgeLabel, accountAgeDays, cagr, weeklyFreq, avgOpsPerWeek, avgWin, avgLoss, payoffRatio, bestTrade, worstTrade, recoveryFactor, calmarRatio, pctTimeInDD, rolling10Wr, rollingHistory, pairArray, monthlyBarDataFiltered };
}

// ─── HELPERS ───────────────────────────────────────
function pct(v) { v = v || 0; return (v > 0 ? '+' : '') + v.toFixed(1) + '%'; }
function pfStr(v) { if (!v && v !== 0) return '—'; return v === Infinity || v > 99 ? '∞' : v.toFixed(2); }
function pnlColor(v) { return v > 0 ? 'var(--green)' : v < 0 ? 'var(--red)' : 'var(--muted)'; }
function wrColor(v) { return v >= 70 ? 'var(--green)' : v >= 50 ? 'var(--yellow)' : 'var(--red)'; }
const opColors = { Dani: 'var(--dani)', Sergio: 'var(--sergio)', 'D&S': 'var(--ds)' };
const opHex = { Dani: '#4BA3E3', Sergio: '#00D49A', 'D&S': '#FF4C5E' };
function oc(op) { return opColors[op] || 'var(--blue)'; }
function och(op) { return opHex[op] || '#4BA3E3'; }
function tc(t) { return t === 'T1' ? 'var(--green)' : t === 'T3' ? 'var(--yellow)' : t === 'T4' ? 'var(--red)' : 'var(--muted)'; }
function tch(t) { return t === 'T1' ? '#00D49A' : t === 'T3' ? '#FFB547' : t === 'T4' ? '#FF4C5E' : '#3A4A5C'; }

// ─── CONNECT ───────────────────────────────────────
async function connect() {
  const input = document.getElementById('csvUrl');
  const btn = document.getElementById('btnConnect');
  const err = document.getElementById('errMsg');
  let url = input.value.trim();
  if (!url) return;
  btn.disabled = true; btn.textContent = 'Guardando...'; err.textContent = '';
  await loadData(url, err);
  btn.disabled = false; btn.textContent = 'Guardar';
  if (currentUrl) closeSetup();
}

async function fetchWithFallback(url) {
  const proxies = [
    u => u + (u.includes('?') ? '&' : '?') + 't=' + Date.now(),
    u => 'https://corsproxy.io/?' + encodeURIComponent(u),
    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
  ];
  let lastErr = '';
  for (const buildUrl of proxies) {
    try {
      const res = await fetch(buildUrl(url));
      if (!res.ok) { lastErr = 'HTTP ' + res.status; continue; }
      const text = await res.text();
      // Si devuelve HTML (login de Google u otro error), ignorar
      if (text.trim().startsWith('<')) { lastErr = 'Respuesta no válida'; continue; }
      if (text.trim().length < 10) { lastErr = 'Respuesta vacía'; continue; }
      return text;
    } catch(e) { lastErr = e.message; }
  }
  throw new Error('No se pudo cargar la fuente de datos. Error: ' + lastErr);
}

async function loadData(url, errEl) {
  if (url.includes('docs.google.com/spreadsheets') && !url.includes('pub?') && !url.includes('export')) {
    const m = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    if (m) url = `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv&gid=0`;
  }
  try {
    document.getElementById('loading').style.display = 'flex';
    const text = await fetchWithFallback(url);
    const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });
    if (!data.length) throw new Error('La hoja está vacía');
    currentUrl = url;
    currentRawData = data;
    localStorage.setItem(CSV_KEY, url);
    renderDash(compute(filterData(data, currentFilter)));
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    if (errEl) errEl.textContent = 'Error: ' + e.message + '. Verifica que la URL es correcta y está accesible.';
    else alert('Error al actualizar: ' + e.message);
  }
}

async function refresh() {
  if (!currentUrl) { showSetup(); return; }
  // Fuerza recarga limpia añadiendo timestamp único para evitar caché
  const urlWithBust = currentUrl.replace(/[&?]t=\d*/g, '') + '&t=' + Date.now();
  const btn = document.querySelector('.top-btns button');
  if (btn) { btn.textContent = '⟳ Actualizando...'; btn.disabled = true; }
  await loadData(urlWithBust, null);
  if (btn) { btn.textContent = '⟳ Actualizar'; btn.disabled = false; }
}

function showSetup() {
  const modal = document.getElementById('setup');
  modal.style.display = 'flex';
  const inp = document.getElementById('csvUrl');
  if (inp) inp.value = currentUrl;
}

function closeSetup() {
  document.getElementById('setup').style.display = 'none';
}

          <td style="padding:9px 14px;text-align:center;font-weight:700;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;color:${wrC}">${p.wr.toFixed(0)}%</td>
          <td style="padding:9px 14px;text-align:center;font-weight:700;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;color:${pnlC}">${p.netPnl>=0?'+':''}${p.netPnl.toFixed(1)}%</td>
          <td style="padding:9px 14px;text-align:center;font-weight:700;font-family:'Inter',sans-serif;color:${pfC}">${p.pf===Infinity||p.pf>99?'∞':p.pf.toFixed(2)}</td>
        </tr>`;
      });
      ph += '</tbody>';
      pairTable.innerHTML = ph;
    }

    // Rolling Win Rate chart
    const rwCtx = document.getElementById('rollingWrChart');
    if (rwCtx && m.rollingHistory && m.rollingHistory.length) {
      const rwC = new Chart(rwCtx, {
        type: 'line',
        data: {
          labels: m.rollingHistory.map(r => r.i),
          datasets: [
            { label: 'Rolling WR', data: m.rollingHistory.map(r => r.wr),
              borderColor: '#4BA3E3', borderWidth: 2, tension: 0.4, fill: false,
              pointRadius: 2, pointBackgroundColor: '#4BA3E3' },
            { label: 'WR Global', data: m.rollingHistory.map(() => m.wr),
              borderColor: '#00D49A', borderWidth: 1.5, borderDash: [5,4],
              tension: 0, fill: false, pointRadius: 0 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false },
            tooltip: { callbacks: { label: ctx => ctx.dataset.label+': '+ctx.parsed.y.toFixed(0)+'%' } } },
          scales: {
            x: { ticks: { color: '#5A7A9A', font: { size: 9 } }, grid: { color: 'rgba(128,128,128,0.08)' } },
            y: { min:0, max:100, ticks: { color: '#5A7A9A', font: { size: 9 }, callback: v => v+'%' }, grid: { color: 'rgba(128,128,128,0.08)' } }
          }
        }
      });
      activeCharts.push(rwC);
    }

    // Frequency chart with moving average
    const freqCtx = document.getElementById('freqChart');
    if (freqCtx && m.weeklyFreq && m.weeklyFreq.length) {
      const freqData = m.weeklyFreq.map(w => w.ops);
      const windowSize = Math.min(4, m.weeklyFreq.length);
      const movAvg = freqData.map((_, i) => {
        const slice = freqData.slice(Math.max(0, i - windowSize + 1), i + 1);
        return +(slice.reduce((a,b)=>a+b,0)/slice.length).toFixed(2);
      });
      const fc = new Chart(freqCtx, {
        type: 'bar',
        data: {
          labels: m.weeklyFreq.map(w => w.key.replace('-W','/W')),
          datasets: [
            {
              type: 'bar',
              label: 'Ops semana',
              data: freqData,
              backgroundColor: m.weeklyFreq.map(w => {
                const wr = w.ops > 0 ? w.tp/w.ops : 0;
                return wr >= 0.7 ? '#00D49A66' : wr >= 0.5 ? '#FFB54766' : '#FF4C5E66';
              }),
              borderRadius: 4,
              order: 2
            },
            {
              type: 'line',
              label: 'Media móvil',
              data: movAvg,
              borderColor: '#4BA3E3',
              borderWidth: 2,
              tension: 0.4,
              fill: false,
              pointRadius: 3,
              pointBackgroundColor: '#4BA3E3',
              order: 1
            },
            {
              type: 'line',
              label: 'Media global',
              data: freqData.map(() => +m.avgOpsPerWeek.toFixed(2)),
              borderColor: '#FFB547',
              borderWidth: 1.5,
              borderDash: [6, 4],
              tension: 0,
              fill: false,
              pointRadius: 0,
              order: 0
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { 
              title: items => items[0].label,
              label: ctx => {
                if (ctx.dataset.label === 'Ops semana') {
                  const w = m.weeklyFreq[ctx.dataIndex];
                  return [ctx.parsed.y+' ops · '+w.tp+'✓ '+w.sl+'✗'];
                }
                if (ctx.dataset.label === 'Media móvil') return 'Media móvil: '+ctx.parsed.y;
                return 'Media global: '+ctx.parsed.y;
              }
            }}
          },
          scales: {
            x: { ticks: { color: '#5A7A9A', font: { size: 8 }, maxRotation: 45 }, grid: { color: 'rgba(128,128,128,0.06)' } },
            y: { ticks: { color: '#5A7A9A', font: { size: 9 }, stepSize: 1 }, grid: { color: 'rgba(128,128,128,0.06)' } }
          }
        }
      });
      activeCharts.push(fc);
    }

    // €100k evolution chart - clean smooth curve
    const euroCtx = document.getElementById('euroChart');
    if (euroCtx) {
      const euroData = [100000, ...m.equity.map(e => e.euroVal || 100000)];
      const euroLabels = [0, ...m.equity.map((_, i) => i + 1)];
      const textColor = '#5A7A9A';
      const gridColor = 'rgba(128,128,128,0.08)';
      const ec = new Chart(euroCtx, {
        type: 'line',
        data: {
          labels: euroLabels,
          datasets: [{
            data: euroData,
            borderColor: '#00D49A',
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            backgroundColor: (ctx) => {
              const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, ctx.chart.height);
              gradient.addColorStop(0, 'rgba(0,212,154,0.18)');
              gradient.addColorStop(1, 'rgba(0,212,154,0.01)');
              return gradient;
            },
            pointRadius: 0,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: '#00D49A',
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: items => {
                  const i = items[0].dataIndex;
                  if (i === 0) return 'Inicio';
                  const e = m.equity[i-1];
                  let cumOps = 0, monthLabel = '';
                  for (const row of m.monthly) {
                    const mOps = m.allOps.reduce((s,op)=>s+(row.ops[op]?.tp||0)+(row.ops[op]?.sl||0),0);
                    cumOps += mOps;
                    if ((i-1) < cumOps) { monthLabel = row.label; break; }
                  }
                  return 'Op #'+i+(e?' · '+e.n:'')+(monthLabel?' · '+monthLabel:'');
                },
                label: ctx => {
                  const i = ctx.dataIndex;
                  const val = ctx.parsed.y;
                  const fmtVal = new Intl.NumberFormat('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}).format(val);
                  if (i === 0) return 'Capital: '+fmtVal+' €';
                  const e = m.equity[i-1];
                  const sign = (e?.pnlV||0) >= 0 ? '+' : '';
                  const changeEur = e ? Math.round(e.pnlV/100 * m.equity[i-2]?.euroVal || 0) : 0;
                  return [
                    'Capital: '+fmtVal+' €',
                    e ? 'Op: '+sign+e.pnlV.toFixed(1)+'% · '+e.res : ''
                  ].filter(Boolean);
                }
              }
            }
          },
          scales: {
            x: {
              ticks: { color: textColor, font: { size: 9 }, maxTicksLimit: 12 },
              grid: { color: gridColor },
              title: { display: true, text: 'Operación #', color: textColor, font: { size: 9 } }
            },
            y: {
              ticks: {
                color: textColor, font: { size: 9 },
                callback: v => new Intl.NumberFormat('es-ES',{maximumFractionDigits:0}).format(v)+' €'
              },
              grid: { color: gridColor }
            }
          }
        }
      });
      activeCharts.push(ec);
    }

    // Monthly WR panel - polished column layout
    const wrBadges = document.getElementById('monthlyWrBadges');
    if (wrBadges && m.monthly.length) {
      const opHexMap3 = { Dani: '#4BA3E3', Sergio: '#00D49A', 'D&S': '#FF4C5E' };
      let html = '';
      m.monthly.forEach(row => {
        let totalTp = 0, totalSl = 0;
        const opRows = m.allOps.map(op => {
          const od = row.ops[op]; if (!od) return null;
          const tp = od.tp||0, sl = od.sl||0;
          totalTp += tp; totalSl += sl;
          const total = tp+sl; if (!total) return null;
          const wr = tp/total*100;
          const opCol = opHexMap3[op]||'#4BA3E3';
          const wrCol = wr>=70?'#00D49A':wr>=50?'#FFB547':'#FF4C5E';
          const barW = wr.toFixed(0);
          return `<div style="display:flex;flex-direction:column;gap:3px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:11px;font-weight:500;color:${opCol}">${op}</span>
              <span style="font-size:13px;font-weight:700;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;color:${wrCol}">${barW}%</span>
            </div>
            <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden">
              <div style="width:${barW}%;height:100%;background:${wrCol};border-radius:3px"></div>
            </div>
            <span style="font-size:10px;color:var(--muted)">${tp} TP · ${sl} SL</span>
          </div>`;
        }).filter(Boolean);
        if (!opRows.length) return;
        const globalTotal = totalTp+totalSl;
        const globalWr = globalTotal>0?(totalTp/globalTotal*100):null;
        const globalCol = globalWr===null?'var(--muted)':globalWr>=70?'#00D49A':globalWr>=50?'#FFB547':'#FF4C5E';
        html += `<div style="background:var(--panel2);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;min-width:160px;flex:1;max-width:220px">
          <div style="background:var(--bg);padding:10px 14px;border-bottom:0.5px solid var(--border)">
            <span style="font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.08em">${row.label}</span>
          </div>
          <div style="padding:12px 14px;display:flex;flex-direction:column;gap:12px">
            ${opRows.join('')}
            <div style="border-top:0.5px solid var(--border);padding-top:10px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:11px;font-weight:500;color:var(--textSub)">Win Rate Global</span>
              <span style="font-size:16px;font-weight:700;font-family:'Inter',sans-serif;color:${globalCol}">${globalWr!==null?globalWr.toFixed(0)+'%':'—'}</span>
            </div>
          </div>
        </div>`;
      });
      wrBadges.innerHTML = html;
    }
  }, 100);
}

// ─── PASSWORD ──────────────────────────────────────
const PW_KEY = 'td_auth';
const CORRECT_PW = 'dcm';

function checkPw() {
  const input = document.getElementById('pwInput');
  const err = document.getElementById('pwErr');
  if (!input) return;
  if (input.value === CORRECT_PW) {
    localStorage.setItem(PW_KEY, '1');
    document.getElementById('passwordScreen').style.display = 'none';
    initDashboard();
  } else {
    err.textContent = 'Contraseña incorrecta';
    input.value = '';
    input.focus();
    setTimeout(() => { if(err) err.textContent = ''; }, 2000);
  }
}

function initDashboard() {
  try {
    const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
    applyTheme(savedTheme);
    loadData(currentUrl, null);
  } catch(e) {
    console.error('initDashboard error:', e);
    alert('Error al iniciar: ' + e.message);
  }
}

// ─── THEME ─────────────────────────────────────────
const THEME_KEY = 'trading_theme';
function applyTheme(theme) {
  const root = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if (theme === 'light') {
    root.classList.add('light');
    if (btn) btn.textContent = '☀️';
  } else {
    root.classList.remove('light');
    if (btn) btn.textContent = '🌙';
  }
  localStorage.setItem(THEME_KEY, theme);
}
function toggleTheme() {
  const current = localStorage.getItem(THEME_KEY) || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

// ─── AUTO-LOAD ──────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Restore theme always
  const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
  applyTheme(savedTheme);
  // Check password
  if (localStorage.getItem(PW_KEY) === '1') {
    document.getElementById('passwordScreen').style.display = 'none';
    initDashboard();
  } else {
    // Show password screen, focus input
    setTimeout(() => {
      const inp = document.getElementById('pwInput');
      if (inp) inp.focus();
    }, 100);
  }
});
</script>
